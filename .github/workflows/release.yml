name: Release

on:
  push:
    branches: [main]
    # Only trigger on merged PRs (push to main), not on tag pushes
    tags-ignore: ["**"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io/layer87-labs

jobs:
  # ── Step 1: relctl creates a GitHub Release (CalVer tag) ──────────────────
  create-release:
    uses: layer87-labs/relctl-action/.github/workflows/create-release.yml@main
    with:
      version-scheme: calver
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: Build and push code images ────────────────────────────────────
  build-and-push:
    needs: create-release
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.create-release.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Test
        run: go test -race ./...

      - name: Build router binary
        run: make build/router

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Code images (CalVer from relctl) ────────────────────────────────

      - name: Build and push router
        run: |
          make docker/router VERSION=${{ env.VERSION }}
          make push/router VERSION=${{ env.VERSION }}

      - name: Build and push TEI base
        run: |
          make docker/tei-base VERSION=${{ env.VERSION }}
          docker push ${{ env.REGISTRY }}/tei-base:${{ env.VERSION }}

      - name: Build and push TEI runtime
        run: |
          make docker/tei-runtime VERSION=${{ env.VERSION }}
          docker push ${{ env.REGISTRY }}/tei-runtime:${{ env.VERSION }}

      # ── Helm chart (OCI → ghcr.io) ───────────────────────────────────────

      - name: Package and push Helm chart
        run: |
          helm package deploy/helm/ --version ${{ env.VERSION }} --app-version ${{ env.VERSION }}
          helm push inference-stack-${{ env.VERSION }}.tgz oci://${{ env.REGISTRY }}/charts

      # ── Publish the GitHub Release ──────────────────────────────────────

      - name: Publish release
        uses: layer87-labs/relctl-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run: relctl release publish --release-id ${{ needs.create-release.outputs.release-id }}
