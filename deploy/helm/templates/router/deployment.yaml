{{- if .Values.router.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-stack.fullname" . }}-router
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  replicas: {{ .Values.router.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "inference-stack.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "inference-stack.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: router
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.router.metricsPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      {{- include "inference-stack.imagePullSecrets" (dict "local" .Values.router.imagePullSecrets "global" .Values.global.imagePullSecrets) | nindent 6 }}
      {{- with (coalesce .Values.router.nodeSelector .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.router.tolerations .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: router
        image: {{ include "inference-stack.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.router.image.repository "tag" .Values.router.image.tag "appVersion" .Chart.AppVersion) }}
        imagePullPolicy: {{ .Values.router.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.router.metricsPort }}
          protocol: TCP
        env:
        - name: ROUTER_ADDR
          value: ":8080"
        - name: ROUTER_METRICS_ADDR
          value: ":{{ .Values.router.metricsPort }}"
        - name: LOG_FORMAT
          value: "json"
        - name: EMBEDDING_ENABLED
          value: {{ .Values.embedding.enabled | quote }}
        {{- if .Values.embedding.enabled }}
        - name: EMBEDDING_URL
          value: "http://{{ include "inference-stack.fullname" . }}-embedding:{{ .Values.embedding.service.port }}"
        {{- end }}
        - name: RERANKER_ENABLED
          value: {{ .Values.reranker.enabled | quote }}
        {{- if .Values.reranker.enabled }}
        - name: RERANKER_URL
          value: "http://{{ include "inference-stack.fullname" . }}-reranker:{{ .Values.reranker.service.port }}"
        {{- end }}
        - name: WHISPER_ENABLED
          value: {{ .Values.whisper.enabled | quote }}
        {{- if .Values.whisper.enabled }}
        - name: WHISPER_URL
          value: "http://{{ include "inference-stack.fullname" . }}-whisper:{{ .Values.whisper.service.port }}"
        {{- end }}
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.router.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.router.securityContext | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inference-stack.fullname" . }}-router
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.router.service.port }}
    targetPort: http
    protocol: TCP
  - name: metrics
    port: {{ .Values.router.metricsPort }}
    targetPort: metrics
    protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "inference-stack.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: router
{{- end }}
