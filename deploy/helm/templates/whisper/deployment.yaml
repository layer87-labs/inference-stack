{{- if .Values.whisper.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-stack.fullname" . }}-whisper
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "inference-stack.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: whisper
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "inference-stack.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: whisper
    spec:
      {{- include "inference-stack.imagePullSecrets" (dict "local" .Values.whisper.imagePullSecrets "global" .Values.global.imagePullSecrets) | nindent 6 }}
      {{- with (coalesce .Values.whisper.nodeSelector .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.whisper.tolerations .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: whisper
        image: {{ include "inference-stack.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.whisper.image.repository "tag" .Values.whisper.image.tag "appVersion" .Chart.AppVersion) }}
        imagePullPolicy: {{ .Values.whisper.image.pullPolicy }}
        env:
        - name: ASR_MODEL
          value: {{ .Values.whisper.modelName | quote }}
        - name: ASR_ENGINE
          value: "faster_whisper"
        ports:
        - name: http
          containerPort: {{ .Values.whisper.service.port }}
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /docs
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /docs
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        {{- if .Values.whisper.startupProbe.enabled }}
        startupProbe:
          httpGet:
            path: {{ .Values.whisper.startupProbe.httpGet.path }}
            port: {{ .Values.whisper.startupProbe.httpGet.port }}
          periodSeconds: {{ .Values.whisper.startupProbe.periodSeconds }}
          failureThreshold: {{ .Values.whisper.startupProbe.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.whisper.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.whisper.securityContext | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inference-stack.fullname" . }}-whisper
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: whisper
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.whisper.service.port }}
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "inference-stack.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: whisper
{{- end }}
