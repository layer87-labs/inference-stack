{{- if .Values.embedding.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inference-stack.fullname" . }}-embedding
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: embedding
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "inference-stack.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: embedding
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "inference-stack.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: embedding
    spec:
      securityContext:
        fsGroup: 1000
      {{- include "inference-stack.imagePullSecrets" (dict "local" .Values.embedding.imagePullSecrets "global" .Values.global.imagePullSecrets) | nindent 6 }}
      {{- with (coalesce .Values.embedding.nodeSelector .Values.global.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (coalesce .Values.embedding.tolerations .Values.global.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: model-init
        image: {{ include "inference-stack.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.embedding.modelInit.image.repository "tag" .Values.embedding.modelInit.image.tag "appVersion" .Chart.AppVersion) }}
        imagePullPolicy: {{ .Values.embedding.modelInit.image.pullPolicy }}
        command: ["sh", "-c", "rsync -rlgoDv --ignore-existing /model-baked/ /model/ && echo 'model-init: done'"]
        volumeMounts:
        - name: model
          mountPath: /model
      containers:
      - name: tei
        image: {{ include "inference-stack.image" (dict "registry" .Values.global.imageRegistry "repo" .Values.embedding.image.repository "tag" .Values.embedding.image.tag "appVersion" .Chart.AppVersion) }}
        imagePullPolicy: {{ .Values.embedding.image.pullPolicy }}
        args:
          - "--model-id"
          - {{ .Values.embedding.modelID | quote }}
          - "--port"
          - {{ .Values.embedding.service.port | quote }}
          {{- if .Values.embedding.dtype }}
          - "--dtype"
          - {{ .Values.embedding.dtype | quote }}
          {{- end }}
          {{- if .Values.embedding.pooling }}
          - "--pooling"
          - {{ .Values.embedding.pooling | quote }}
          {{- end }}
          - "--auto-truncate"
          {{- range .Values.embedding.extraArgs }}
          - {{ . | quote }}
          {{- end }}
        env:
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: HUGGINGFACE_OFFLINE
          value: "1"
        ports:
        - name: http
          containerPort: {{ .Values.embedding.service.port }}
          protocol: TCP
        startupProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: {{ .Values.embedding.startupProbe.periodSeconds }}
          timeoutSeconds: 10
          failureThreshold: {{ .Values.embedding.startupProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: http
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          {{- toYaml .Values.embedding.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.embedding.securityContext | nindent 10 }}
        volumeMounts:
        - name: model
          mountPath: /model
          readOnly: true
        - name: data
          mountPath: /data
      volumes:
      - name: model
        {{- if .Values.embedding.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "inference-stack.fullname" . }}-embedding-model
        {{- else }}
        emptyDir:
          sizeLimit: 5Gi
        {{- end }}
      - name: data
        emptyDir:
          sizeLimit: 1Gi
{{- if .Values.embedding.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "inference-stack.fullname" . }}-embedding-model
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: embedding
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.embedding.persistence.size }}
  {{- $sc := coalesce .Values.embedding.persistence.storageClass .Values.global.storageClass }}
  {{- if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "inference-stack.fullname" . }}-embedding
  labels:
    {{- include "inference-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: embedding
spec:
  type: ClusterIP
  ports:
  - name: http
    port: {{ .Values.embedding.service.port }}
    targetPort: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: {{ include "inference-stack.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: embedding
{{- end }}
