# Inference Stack — Helm values
#
# All model backends are disabled by default.
# Enable selectively per deployment:
#
#   embedding.enabled: true
#   reranker.enabled:  true
#   whisper.enabled:   true
#   router.enabled:    true
#
# Architecture:
#   tei-runtime             — TEI image for embedding (BGE-M3) and reranking (bge-reranker-v2-m3)
#   tei-model-init          — init container that copies baked embedding model to a shared volume
#   tei-reranker-model-init — init container that copies ONNX-exported reranker model to a shared volume
#   whisper                 — ASR server with model baked in
#   router                  — unified OpenAI-compatible proxy

# ── Global ────────────────────────────────────────────────────────────────────
global:
  imageRegistry: "ghcr.io/layer87-labs"
  storageClass: ""
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

# ── Inference Router ──────────────────────────────────────────────────────────
router:
  enabled: true

  image:
    repository: inference-router
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  replicas: 1

  service:
    port: 8080

  metricsPort: 9090

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  healthCheckInterval: "15s"

  # Pod-level security context
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: [ALL]

  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Embedding — BAAI/bge-m3 ───────────────────────────────────────────────────
embedding:
  enabled: false

  # tei-runtime image — TEI embedding server (BGE-M3)
  image:
    repository: tei-runtime
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  # Model init container — copies baked model to shared /model volume
  # Model images are versioned independently: <model>-<YYYY.MM>
  modelInit:
    image:
      repository: tei-model-init
      tag: "bge-m3-2026.06" # model images have their own version scheme
      pullPolicy: IfNotPresent
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]

  # TEI args
  modelID: "/model" # model is loaded from volume, not HuggingFace
  dtype: "float32"
  # Pooling strategy for BGE-M3 embeddings
  pooling: "cls"
  # CPU tuning: default --max-batch-tokens is 16384 (GPU-tuned, OOMs on CPU).
  # Use 4096 for fp32 on CPU to keep RSS at ~3-6Gi.
  #
  # Resource requirements by --max-batch-tokens (BGE-M3, fp32, CPU):
  #   4096  -> 3-6Gi  RSS  (recommended for CPU)
  #   8192  -> 6-10Gi RSS  (may OOM on 8Gi limit)
  #   16384 -> 10-16Gi RSS (GPU-only, OOMs on typical CPU nodes)
  extraArgs:
    - "--max-batch-tokens"
    - "4096"

  service:
    port: 80

  resources:
    requests:
      cpu: "500m"
      memory: "3Gi"
    limits:
      cpu: "2"
      memory: "6Gi"

  # Model volume — PVC keeps model across pod restarts (avoids re-copy)
  # Set enabled: false to use emptyDir (model copied from init container every start)
  persistence:
    enabled: true
    size: "5Gi"
    storageClass: "" # falls back to global.storageClass

  startupProbe:
    periodSeconds: 15
    failureThreshold: 40 # up to 10 min for model load

  # Pod-level security context
  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: [ALL]

  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

# ── Reranker — BAAI/bge-reranker-v2-m3 ───────────────────────────────────────
# Uses TEI (Rust/ONNX via ORT backend) — same runtime image as embedding.
# Model is exported to ONNX during image build (tei-reranker-model-init).
# TEI auto-detects SequenceClassification architecture → reranker mode.
# Router rewrites /v1/rerank → /rerank before forwarding to this backend.
reranker:
  enabled: false

  # tei-runtime image — same runtime as embedding, handles reranking via ONNX
  image:
    repository: tei-runtime
    tag: "" # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  # Model init container — ONNX-exported bge-reranker-v2-m3
  modelInit:
    image:
      repository: tei-reranker-model-init
      tag: "bge-reranker-v2-m3-2026.06"
      pullPolicy: IfNotPresent
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop: [ALL]

  modelID: "/model"

  # CPU tuning: ORT warmup with default 16384 batch tokens OOMs on CPU nodes.
  # 2048 keeps RSS within 8Gi limit during warmup and inference.
  #
  # Resource requirements by --max-batch-tokens (bge-reranker-v2-m3, fp32 ONNX, CPU):
  #   2048  -> 4-8Gi  RSS  (recommended for CPU)
  #   4096  -> 8-12Gi RSS  (may OOM on 8Gi limit)
  #   16384 -> OOM         (GPU-only)
  extraArgs:
    - "--max-batch-tokens"
    - "2048"

  service:
    port: 80

  resources:
    requests:
      cpu: "500m"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  # Model volume — PVC keeps model across pod restarts (avoids re-copy)
  persistence:
    enabled: true
    size: "4Gi"
    storageClass: "" # falls back to global.storageClass

  startupProbe:
    periodSeconds: 15
    failureThreshold: 40 # up to 10 min for ONNX model load + ORT warmup

  # Pod-level security context
  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    seccompProfile:
      type: RuntimeDefault
    capabilities:
      drop: [ALL]

  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

# ── Whisper — OpenAI-compatible ASR ───────────────────────────────────────────
whisper:
  enabled: false

  # Whisper image has model baked in — versioned as <model>-<YYYY.MM>
  image:
    repository: whisper
    tag: "large-v3-turbo-2026.06"
    pullPolicy: IfNotPresent

  modelName: "large-v3-turbo"

  service:
    port: 9000

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  # Pod-level security context. ctranslate2.so requires Unconfined seccomp
  # (see container securityContext below), so the pod default matches.
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: Unconfined

  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: [ALL]
    # ctranslate2.so (faster-whisper) uses mprotect(PROT_EXEC) — needs
    # relaxed seccomp until ctranslate2 is rebuilt without execstack.
    seccompProfile:
      type: Unconfined

  # Startup probe — whisper loads the model on first request and may
  # need 30-60s to warm up on CPU.
  startupProbe:
    enabled: true
    httpGet:
      path: /docs
      port: http
    periodSeconds: 15
    failureThreshold: 40

  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []

# ── ServiceMonitor (Prometheus Operator) ──────────────────────────────────────
serviceMonitor:
  enabled: false
  namespace: ""
  labels:
    release: kube-prometheus-stack
  interval: "30s"
  scrapeTimeout: "10s"

# ── Network Policy ────────────────────────────────────────────────────────────
networkPolicy:
  enabled: false
  ingressNamespaces: []
